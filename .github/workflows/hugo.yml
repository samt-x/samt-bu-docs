name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  repository_dispatch:
    types: [module-updated]

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.155.3
    steps:
      - name: Install Hugo CLI
        run: |
          for i in 1 2 3; do
            wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb && break
            echo "Attempt $i failed, retrying in $((i * 5)) seconds..."
            sleep $((i * 5))
          done
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # Hugo-moduler som monterer innhold i dette nettstedet.
      # For hvert modulrepo som skal ha automatisk synkronisering og korrekte lastmod-datoer:
      #   1. Legg til en checkout-blokk her (kopier mønsteret under)
      #   2. Legg til i HUGO_MODULE_REPLACEMENTS lenger ned
      #   3. Legg til i MODULE_PATHS i .github/scripts/inject-lastmod.py
      # Merk: repoet MÅ også ha en workflow som trigger repository_dispatch til samt-bu-docs ved push.
      - name: Checkout team-architecture module
        uses: actions/checkout@v4
        with:
          repository: SAMT-X/team-architecture
          path: .hugo-modules/team-architecture
          fetch-depth: 0

      - name: Checkout samt-bu-drafts module
        uses: actions/checkout@v4
        with:
          repository: SAMT-X/samt-bu-drafts
          path: .hugo-modules/samt-bu-drafts
          fetch-depth: 0

      - name: Checkout solution-samt-bu-docs module
        uses: actions/checkout@v4
        with:
          repository: SAMT-X/solution-samt-bu-docs
          path: .hugo-modules/solution-samt-bu-docs
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Inject lastmod into module content
        run: python3 .github/scripts/inject-lastmod.py

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Europe/Oslo
          HUGO_MODULE_REPLACEMENTS: >-
            github.com/SAMT-X/team-architecture ->
            ${{ github.workspace }}/.hugo-modules/team-architecture,
            github.com/SAMT-X/samt-bu-drafts ->
            ${{ github.workspace }}/.hugo-modules/samt-bu-drafts,
            github.com/SAMT-X/solution-samt-bu-docs ->
            ${{ github.workspace }}/.hugo-modules/solution-samt-bu-docs
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "https://samt-bu-docs.pages.dev/"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler pages deploy ./public --project-name samt-bu-docs --branch main

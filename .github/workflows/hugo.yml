name: Bygg og deploy til Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  repository_dispatch:
    types: [module-updated]

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  uuid-check:
    # CF Pages bygger automatisk ved push via Git-integrasjon – kun UUID-sjekk trengs her
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Sikre UUID-er i frontmatter
        run: |
          python3 .github/scripts/ensure-uuids.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          if git diff --staged --quiet; then
            echo "Ingen endringer – alle UUID-er var på plass"
          else
            git commit -m "Auto: legg til manglende UUID-er i frontmatter [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push-forsøk $i feilet, prøver igjen..."
              sleep 3
            done
          fi

  trigger-cf-build:
    # Moduloppdateringer og manuell kjøring – trigger CF Pages deploy hook
    if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -d "" "${{ secrets.CF_PAGES_DEPLOY_HOOK }}")
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
